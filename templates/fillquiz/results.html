{% extends 'base.html' %}

{% block content %}
<h2>Quiz Results</h2>
<p>Score: {{ attempt.correct_count }} / {{ attempt.total_questions }}</p>
<table>
  <thead><tr><th>Word</th><th>Question</th><th>Your answer</th><th>Correct?</th></tr></thead>
  <tbody>
  {% for r in results %}
    <tr>
      <td>{{ r.word }}</td>
      <td>{{ r.question }}</td>
      <td>{{ r.submitted }}</td>
      <td>{{ 'Yes' if r.correct else 'No' }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
